<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --indigo: #2d1b69;
    --violet: #7c3aed;
    --lavender: #a78bfa;
    --mist: #c4b5fd;
    --white: #f5f3ff;
    --sky: #a5b4fc;
    --midnight: #0f0a1e;
    --glass: rgba(255,255,255,0.06);
    --glass-border: rgba(255,255,255,0.15);
    --blur: blur(22px);
  }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: 'Outfit', sans-serif;
    background: var(--midnight);
    color: var(--white);
  }

  /* ---- SCENE ---- */
  .scene {
    position: fixed; inset: 0;
    background: linear-gradient(175deg, #d0daf0 0%, #a8b8e8 15%, #7b8fcf 28%, #5462b0 40%, #3b3494 55%, #1e1060 75%, #0a0620 100%);
    overflow: hidden;
  }

  /* Birds */
  .birds { position: absolute; top: 5%; left: 0; width: 100%; height: 60px; }
  .bird {
    position: absolute;
    width: 12px; height: 4px;
    border-top: 3px solid rgba(20,10,50,0.7);
    border-radius: 50% 50% 0 0;
    animation: fly linear infinite;
  }
  .bird::after {
    content: '';
    position: absolute;
    right: -12px; top: -3px;
    width: 12px; height: 4px;
    border-top: 3px solid rgba(20,10,50,0.7);
    border-radius: 50% 50% 0 0;
  }
  .bird:nth-child(1) { left: 15%; top: 8px;  animation-duration: 18s; animation-delay: 0s; }
  .bird:nth-child(2) { left: 18%; top: 18px; animation-duration: 20s; animation-delay: 1s; transform: scale(0.7); }
  .bird:nth-child(3) { left: 65%; top: 5px;  animation-duration: 22s; animation-delay: 3s; transform: scale(0.6); }
  .bird:nth-child(4) { left: 70%; top: 15px; animation-duration: 19s; animation-delay: 5s; }
  .bird:nth-child(5) { left: 80%; top: 2px;  animation-duration: 24s; animation-delay: 2s; transform: scale(0.5); }
  @keyframes fly {
    0%   { transform: translateX(0) translateY(0); }
    25%  { transform: translateX(15vw) translateY(-10px); }
    50%  { transform: translateX(30vw) translateY(5px); }
    75%  { transform: translateX(45vw) translateY(-5px); }
    100% { transform: translateX(60vw) translateY(0); }
  }

  /* Mountains layers */
  .mountains { position: absolute; bottom: 0; left: 0; width: 100%; height: 80%; }
  .mt {
    position: absolute;
    bottom: 0;
    clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
  }
  .mt1 { width: 55%; left: 35%; height: 78%; background: #1a1060; }
  .mt2 { width: 45%; left: 55%; height: 65%; background: #231577; }
  .mt3 { width: 50%; left: 10%; height: 60%; background: #2a1b80; clip-path: polygon(0% 100%, 48% 5%, 100% 100%); }
  .mt4 { width: 38%; left: -5%; height: 48%; background: #1d1268; }
  .mt5 { width: 35%; left: 70%; height: 44%; background: #150e55; }
  .mt-fg { width: 120%; left: -10%; height: 25%; background: #0c0830; position: absolute; bottom: 0; clip-path: polygon(0% 100%, 5% 55%, 15% 65%, 25% 40%, 40% 60%, 55% 35%, 65% 55%, 80% 30%, 90% 50%, 100% 35%, 100% 100%); }

  /* Highlight glow on center mountain */
  .mt1::after {
    content: '';
    position: absolute;
    top: 20%; left: 35%; right: 35%; bottom: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(167,139,250,0.25) 0%, transparent 70%);
  }

  /* Stars */
  .stars { position: absolute; inset: 0; pointer-events: none; }
  .star {
    position: absolute;
    border-radius: 50%;
    background: white;
    animation: twinkle ease-in-out infinite alternate;
  }
  @keyframes twinkle { from { opacity: 0.2; } to { opacity: 0.9; } }

  /* Aurora */
  .aurora {
    position: absolute;
    top: 10%; left: 20%; width: 60%; height: 30%;
    background: radial-gradient(ellipse, rgba(124,58,237,0.18) 0%, rgba(99,102,241,0.1) 40%, transparent 70%);
    filter: blur(30px);
    animation: aurora 8s ease-in-out infinite alternate;
  }
  @keyframes aurora {
    from { transform: scale(1) translateX(0); opacity: 0.5; }
    to   { transform: scale(1.15) translateX(5%); opacity: 0.9; }
  }

  /* ---- CARD ---- */
  .card-wrap {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    animation: cardIn 1.1s cubic-bezier(0.22,1,0.36,1) both;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card {
    width: 380px;
    padding: 48px 40px 40px;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    backdrop-filter: var(--blur);
    -webkit-backdrop-filter: var(--blur);
    box-shadow: 0 8px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
    position: relative;
    overflow: hidden;
  }

  /* inner glow */
  .card::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 200px; height: 200px;
    background: radial-gradient(circle, rgba(167,139,250,0.25) 0%, transparent 70%);
    pointer-events: none;
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 2.6rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    text-align: center;
    color: var(--white);
    margin-bottom: 36px;
    position: relative;
  }
  .card-title span {
    display: block;
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--mist), transparent);
    margin: 10px auto 0;
  }

  .field {
    position: relative;
    margin-bottom: 16px;
  }

  .field input {
    width: 100%;
    padding: 14px 48px 14px 20px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 100px;
    color: var(--white);
    font-family: 'Outfit', sans-serif;
    font-size: 0.9rem;
    font-weight: 300;
    letter-spacing: 0.03em;
    outline: none;
    transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
  }
  .field input::placeholder { color: rgba(255,255,255,0.4); }
  .field input:focus {
    border-color: var(--lavender);
    background: rgba(124,58,237,0.12);
    box-shadow: 0 0 0 3px rgba(167,139,250,0.15), inset 0 1px 0 rgba(255,255,255,0.08);
  }

  .field-icon {
    position: absolute;
    right: 16px; top: 50%; transform: translateY(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 1rem;
    pointer-events: none;
    transition: color 0.3s;
  }
  .field input:focus ~ .field-icon { color: var(--lavender); }

  /* eye toggle */
  .toggle-pw {
    position: absolute;
    right: 16px; top: 50%; transform: translateY(-50%);
    background: none; border: none;
    color: rgba(255,255,255,0.35);
    cursor: pointer;
    font-size: 1rem;
    padding: 4px;
    transition: color 0.3s;
  }
  .toggle-pw:hover { color: var(--lavender); }

  .row {
    display: flex; align-items: center; justify-content: space-between;
    margin: 8px 4px 28px;
  }

  .remember {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.8rem; color: rgba(255,255,255,0.5);
    cursor: pointer;
    user-select: none;
  }
  .remember input { display: none; }
  .check-box {
    width: 16px; height: 16px;
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 4px;
    display: grid; place-items: center;
    transition: border-color 0.2s, background 0.2s;
    flex-shrink: 0;
  }
  .check-box::after {
    content: '✓';
    font-size: 10px;
    color: white;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .remember input:checked ~ .check-box {
    background: var(--violet);
    border-color: var(--violet);
  }
  .remember input:checked ~ .check-box::after { opacity: 1; }

  .forgot {
    font-size: 0.8rem;
    color: var(--mist);
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.2s;
  }
  .forgot:hover { opacity: 1; }

  .btn-login {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, #7c3aed, #5b21b6);
    border: none;
    border-radius: 100px;
    color: white;
    font-family: 'Outfit', sans-serif;
    font-size: 0.95rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.3s;
    box-shadow: 0 4px 20px rgba(124,58,237,0.4);
  }
  .btn-login::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, #a78bfa, #7c3aed);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.6); }
  .btn-login:hover::before { opacity: 1; }
  .btn-login:active { transform: translateY(0); }
  .btn-login span { position: relative; z-index: 1; }

  /* loading state */
  .btn-login.loading span { opacity: 0; }
  .btn-login.loading::after {
    content: '';
    position: absolute; top: 50%; left: 50%;
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    transform: translate(-50%,-50%);
  }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }

  .register-row {
    text-align: center;
    margin-top: 20px;
    font-size: 0.82rem;
    color: rgba(255,255,255,0.4);
  }
  .register-row a {
    color: var(--mist);
    text-decoration: none;
    font-weight: 500;
    transition: color 0.2s;
  }
  .register-row a:hover { color: white; }

  /* divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0;
    color: rgba(255,255,255,0.2);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }

  /* social */
  .socials { display: flex; gap: 12px; }
  .social-btn {
    flex: 1;
    padding: 11px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: rgba(255,255,255,0.6);
    font-size: 0.8rem;
    font-family: 'Outfit', sans-serif;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.2s;
  }
  .social-btn:hover {
    background: rgba(255,255,255,0.1);
    border-color: rgba(255,255,255,0.2);
    color: white;
    transform: translateY(-2px);
  }
  .social-btn svg { flex-shrink: 0; }

  /* notification */
  .notif {
    position: fixed; top: 24px; right: 24px;
    padding: 14px 20px;
    background: rgba(15,10,30,0.9);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    backdrop-filter: blur(20px);
    font-size: 0.85rem;
    color: var(--mist);
    transform: translateX(120%);
    transition: transform 0.4s cubic-bezier(0.22,1,0.36,1);
    z-index: 100;
  }
  .notif.show { transform: translateX(0); }
  .notif.error { border-color: rgba(239,68,68,0.4); color: #fca5a5; }
  .notif.success { border-color: rgba(167,139,250,0.4); color: var(--mist); }
</style>
</head>
<body>

<!-- Scene -->
<div class="scene">
  <!-- Stars -->
  <div class="stars" id="stars"></div>
  <!-- Aurora -->
  <div class="aurora"></div>
  <!-- Birds -->
  <div class="birds">
    <div class="bird"></div>
    <div class="bird"></div>
    <div class="bird"></div>
    <div class="bird"></div>
    <div class="bird"></div>
  </div>
  <!-- Mountains -->
  <div class="mountains">
    <div class="mt mt4"></div>
    <div class="mt mt5"></div>
    <div class="mt mt3"></div>
    <div class="mt mt2"></div>
    <div class="mt mt1"></div>
    <div class="mt mt-fg"></div>
  </div>
</div>

<!-- Notification -->
<div class="notif" id="notif"></div>

<!-- Card -->
<div class="card-wrap">
  <div class="card">
    <h1 class="card-title">Login<span></span></h1>

    <div class="field">
      <input type="email" id="email" placeholder="Email ID" autocomplete="email">
      <span class="field-icon">✉</span>
    </div>

    <div class="field">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password">
      <button class="toggle-pw" id="togglePw" type="button" aria-label="Toggle password">👁</button>
    </div>

    <div class="row">
      <label class="remember">
        <input type="checkbox" id="remember">
        <span class="check-box"></span>
        Remember me
      </label>
      <a href="#" class="forgot">Forgot Password?</a>
    </div>

    <button class="btn-login" id="loginBtn" type="button">
      <span>Login</span>
    </button>

    <div class="divider">or continue with</div>

    <div class="socials">
      <button class="social-btn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Google
      </button>
      <button class="social-btn" type="button">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.164 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.604-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836c.85.004 1.705.114 2.504.336 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.161 22 16.416 22 12c0-5.523-4.477-10-10-10z"/></svg>
        GitHub
      </button>
    </div>

    <p class="register-row">Don't have an account? <a href="#">Register</a></p>
  </div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `width:${size}px;height:${size}px;top:${Math.random()*55}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*4}s;opacity:${0.1+Math.random()*0.6}`;
    starsEl.appendChild(s);
  }

  // Password toggle
  const pw = document.getElementById('password');
  document.getElementById('togglePw').addEventListener('click', () => {
    pw.type = pw.type === 'password' ? 'text' : 'password';
  });

  // Notification
  function showNotif(msg, type = 'success') {
    const n = document.getElementById('notif');
    n.textContent = msg;
    n.className = `notif ${type} show`;
    setTimeout(() => n.classList.remove('show'), 3000);
  }

  // Login
  document.getElementById('loginBtn').addEventListener('click', () => {
    const email = document.getElementById('email').value.trim();
    const pass = document.getElementById('password').value;
    const btn = document.getElementById('loginBtn');

    if (!email || !pass) {
      showNotif('Please fill in all fields.', 'error');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      showNotif('Enter a valid email address.', 'error');
      return;
    }

    btn.classList.add('loading');
    setTimeout(() => {
      btn.classList.remove('loading');
      showNotif('✦ Welcome back — logged in successfully.', 'success');
    }, 1800);
  });

  // Enter key
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  });

  // Social buttons
  document.querySelectorAll('.social-btn').forEach(btn => {
    btn.addEventListener('click', () => showNotif('OAuth redirect (demo).', 'success'));
  });
</script>
</body>
</html>
